<!DOCTYPE html>
<html>
<head>
    <title>Sketchmultiverse Portfolio</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        img { width: 100%; border-radius: 10px; border: 2px solid #444; transition: 0.3s; }
        img:hover { border-color: #00aaff; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>The Sketchmultiverse Vault</h1>
    <p>Digital Art created with Procreate & iPad</p>
    <div class="gallery">
        <img src="tiger-cub.jpg">
        <img src="goku.jpg">
        <img src="spiderman.jpg">
    </div>
</body>
</html>
